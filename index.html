<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>gregorio.cz — Doména na prodej</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:32px;

    background:
    radial-gradient(circle at top, #ffffff 0%, #f5f7fb 45%, #eef2f7 100%);

    font-family:'Plus Jakarta Sans', sans-serif;

    color:#111827;

    overflow:hidden;
}

body:before{
    content:"";

    position:absolute;

    width:700px;
    height:700px;

    background:rgba(99,102,241,0.07);

    filter:blur(120px);

    border-radius:50%;

    top:-250px;
    right:-150px;
}

body:after{
    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:rgba(79,70,229,0.05);

    filter:blur(100px);

    border-radius:50%;

    bottom:-180px;
    left:-120px;
}

.box{
    position:relative;

    z-index:2;

    text-align:center;

    max-width:820px;
}

h1{
    margin:0;

    font-size:clamp(64px,8vw,108px);

    line-height:0.92;

    letter-spacing:-0.08em;

    font-weight:700;

    color:#4f46e5;

    text-shadow:
    0 12px 30px rgba(79,70,229,0.12);
}

.subtitle{
    margin-top:16px;

    font-size:clamp(20px,2vw,28px);

    color:#6b7280;

    font-weight:500;

    letter-spacing:-0.03em;
}

.contact-label{
    margin-top:40px;

    font-size:16px;

    color:#8b93a3;

    letter-spacing:-0.01em;
}

.contact{
    margin-top:10px;
}

a{
    color:#111827;

    text-decoration:none;

    font-size:clamp(22px,2vw,30px);

    font-weight:700;

    letter-spacing:-0.04em;

    transition:0.2s;
}

a:hover{
    color:#4f46e5;
}

</style>
</head>

<body>

<div class="box">

<h1>
gregorio.cz
</h1>

<div class="subtitle">
Doména na prodej
</div>

<div class="contact-label">
V případě zájmu mě kontaktujte na
</div>

<div class="contact">
<a href="mailto:davidturecek1@gmail.com">
davidturecek1@gmail.com
</a>
</div>

</div>

</body>
</html>
