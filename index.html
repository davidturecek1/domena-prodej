<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:32px;

    background:

}

.box{

.subtitle{

    font-size:clamp(24px,3vw,36px);

    color:#6b7280;

    font-weight:400;

    letter-spacing:-0.03em;
}

.line{
    width:84px;
    height:5px;

    border-radius:999px;

    background:#4f46e5;

    margin:38px auto;

    box-shadow:
    0 4px 14px rgba(79, 70, 229, 0.18);
}

.contact{
    font-size:22px;

    color:#6b7280;

    line-height:1.7;
}

a{
    color:#111827;

    text-decoration:none;

    font-weight:600;

    transition:0.2s;
}

a:hover{
    color:#4f46e5;
}
